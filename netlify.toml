[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
    # Keep the admin panel out of search indexes entirely.
    X-Robots-Tag = "noindex, nofollow"
    # See the main app's netlify.toml for the CSP rationale. The admin app uses
    # the same Supabase backend + Render server and loads supabase-js from the
    # CDN; it does not use EmailJS.
    # Report-Only first (see the main app's netlify.toml for the rationale).
    # Rename to "Content-Security-Policy" to enforce once verified.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; media-src 'self' blob: https://*.supabase.co https://preparing-you-server.onrender.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://preparing-you-server.onrender.com https://cdn.jsdelivr.net; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
